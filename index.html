<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ימית — חיפוש מלאי</title>
<!-- No CDN dependencies — works on patchy store wifi -->
<style>
/* ── DESIGN TOKENS ── */
:root {
  --bg:    #0c0c0c;
  --surf:  #161616;
  --surf2: #202020;
  --bdr:   #2c2c2c;
  --acc:   #00d4aa;
  --acc-d: rgba(0,212,170,.12);
  --acc-m: rgba(0,212,170,.35);
  --red:   #ff5555;
  --red-d: rgba(255,85,85,.12);
  --txt:   #efefef;
  --mut:   #777;
  --dim:   #3a3a3a;
  --mono:  'Courier New', monospace;
  --sans:  -apple-system, 'Helvetica Neue', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }
body { background: var(--bg); color: var(--txt); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
.hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--bdr); position: sticky; top: 0; background: var(--bg); z-index: 50; }
.logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
.logo span { color: var(--acc); }
.hdr-r { display: flex; gap: 8px; align-items: center; }
.badge { font-family: var(--mono); font-size: 11px; color: var(--mut); background: var(--surf); border: 1px solid var(--bdr); border-radius: 6px; padding: 4px 9px; white-space: nowrap; }
.badge.on { color: var(--acc); border-color: var(--acc-m); }
.ibtn { background: var(--surf); border: 1px solid var(--bdr); color: var(--mut); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ibtn:active { background: var(--surf2); }
.scr { display: none; }
.scr.show { display: block; }
.ov-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 100; align-items: flex-end; justify-content: center; }
.ov-wrap.show { display: flex; }
.modal { background: var(--surf); border: 1px solid var(--bdr); border-radius: 18px 18px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; }
.mhdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.mhdr h3 { font-size: 17px; font-weight: 700; }
.mclose { background: none; border: none; color: var(--mut); font-size: 20px; cursor: pointer; padding: 4px; }
.lbl { display: block; font-size: 11px; font-weight: 700; color: var(--mut); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
.inp { width: 100%; background: var(--bg); border: 1px solid var(--bdr); border-radius: 9px; padding: 11px 13px; color: var(--txt); font-family: var(--mono); font-size: 13px; direction: ltr; text-align: left; }
.inp:focus { outline: none; border-color: var(--acc); }
.hint { font-size: 11px; color: var(--dim); margin-top: 5px; }
.upwrap { max-width: 480px; margin: 0 auto; padding: 32px 16px 80px; }
.upwrap h2 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
.upwrap p { color: var(--mut); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
.dz { border: 2px dashed var(--bdr); border-radius: 14px; padding: 36px 20px; text-align: center; background: var(--surf); position: relative; cursor: pointer; transition: border-color .15s, background .15s; }
.dz:hover, .dz.ov { border-color: var(--acc); background: var(--acc-d); }
.dz input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.dz-ico { font-size: 36px; margin-bottom: 10px; }
.dz-t { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.dz-s { font-size: 13px; color: var(--mut); }
.flist { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.fi { background: var(--surf); border: 1px solid var(--bdr); border-radius: 10px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.fi.ok  { border-color: var(--acc-m); }
.fi.err { border-color: var(--red); }
.fi-n { font-weight: 600; margin-bottom: 2px; }
.fi-m { font-size: 11px; color: var(--mut); }
.fi-s { font-family: var(--mono); font-size: 12px; }
.fi-s.ok  { color: var(--acc); }
.fi-s.err { color: var(--red); }
.btn { width: 100%; padding: 15px; background: var(--acc); color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: var(--sans); cursor: pointer; margin-top: 18px; transition: background .15s; }
.btn:active { background: #00f0c0; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.swrap { padding: 14px 14px 100px; }
.srow { display: flex; gap: 8px; margin-bottom: 16px; }
.si { flex: 1; background: var(--surf); border: 1.5px solid var(--bdr); border-radius: 13px; padding: 15px 16px; color: var(--txt); font-family: var(--sans); font-size: 16px; font-weight: 500; -webkit-appearance: none; }
.si:focus { outline: none; border-color: var(--acc); background: var(--surf2); }
.si::placeholder { color: var(--dim); font-weight: 400; }
.sbtn { width: 52px; background: var(--acc); color: #000; border: none; border-radius: 13px; font-size: 20px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.sbtn:active { background: #00f0c0; }
.sbtn:disabled { opacity: .5; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
.chip { background: var(--surf); border: 1px solid var(--bdr); border-radius: 18px; padding: 6px 13px; font-size: 12px; color: var(--mut); cursor: pointer; }
.chip:active { border-color: var(--acc); color: var(--acc); }
.stl { font-family: var(--mono); font-size: 11px; color: var(--mut); margin-bottom: 10px; letter-spacing: .5px; text-transform: uppercase; min-height: 16px; }
.nokey-banner { background: var(--surf); border: 1px solid var(--bdr); border-radius: 10px; padding: 10px 13px; margin-bottom: 12px; font-size: 12px; color: var(--mut); display: none; }
.nokey-banner.show { display: block; }
.nokey-banner span { color: var(--acc); cursor: pointer; }
.rlist { display: flex; flex-direction: column; gap: 9px; }
.card { background: var(--surf); border: 1px solid var(--bdr); border-right: 3px solid var(--dim); border-radius: 13px; padding: 14px; }
.card.y { border-right-color: var(--acc); }
.card.n { border-right-color: var(--dim); opacity: .65; }
.ctop { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 9px; }
.cname { font-size: 14px; font-weight: 700; line-height: 1.35; flex: 1; }
.pill { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
.pill.y { background: var(--acc-d); color: var(--acc); border: 1px solid var(--acc-m); }
.pill.n { background: var(--red-d); color: var(--red); border: 1px solid var(--red); }
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
.tag { font-size: 11px; color: var(--mut); background: var(--bg); border: 1px solid var(--bdr); border-radius: 5px; padding: 2px 7px; font-family: var(--mono); }
.variants { font-size: 13px; color: #374151; margin: 4px 0 6px; line-height: 1.7; }
.price-strike { font-size: 13px; color: #9ca3af; text-decoration: line-through; margin-left: 4px; }
.cfoot { padding-top: 9px; border-top: 1px solid var(--bdr); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.reason { font-size: 11px; color: var(--mut); font-style: italic; flex: 1; }
.price-btn { font-size: 11px; color: var(--acc); background: var(--acc-d); border: 1px solid var(--acc-m); border-radius: 6px; padding: 4px 10px; white-space: nowrap; text-decoration: none; flex-shrink: 0; }
.price-tag { font-size: 12px; font-weight: 700; color: var(--acc); flex-shrink: 0; }
.search-btn { color: var(--mut); background: var(--surf2); border-color: var(--bdr); }
.sib-note { font-size: 10px; color: var(--acc); opacity: .8; padding: 3px 0 6px; line-height: 1.5; }
.cat-header { font-size: 10px; font-family: var(--mono); color: var(--mut); padding: 12px 2px 3px; border-top: 1px solid var(--bdr); margin-top: 2px; }
.sk { background: var(--surf); border: 1px solid var(--bdr); border-radius: 13px; padding: 14px; }
.skb { background: var(--surf2); border-radius: 4px; margin-bottom: 8px; }
@keyframes pulse { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
.sk { animation: pulse 1.3s infinite; }
.inv-status { background: var(--surf); border: 1px solid var(--acc-m); border-radius: 10px; padding: 11px 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.inv-status-info { font-size: 13px; }
.inv-status-info strong { color: var(--acc); }
.inv-status-info small { display: block; font-size: 11px; color: var(--mut); margin-top: 2px; }
.inv-status-go { font-size: 12px; color: var(--acc); background: var(--acc-d); border: 1px solid var(--acc-m); border-radius: 6px; padding: 5px 11px; cursor: pointer; white-space: nowrap; }
.empty { text-align: center; padding: 48px 20px; }
.empty .ico { font-size: 38px; margin-bottom: 12px; }
.empty h3 { font-size: 17px; font-weight: 700; margin-bottom: 7px; }
.empty p { font-size: 13px; color: var(--mut); line-height: 1.6; }
</style>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="logo">ימית<span>.</span></div>
  <div class="hdr-r">
    <div class="badge" id="badge">אין מלאי</div>
    <button class="ibtn" title="הגדרות" onclick="openSettings()">&#9881;</button>
  </div>
</div>

<div class="ov-wrap" id="settingsOv">
  <div class="modal">
    <div class="mhdr">
      <h3>הגדרות</h3>
      <button class="mclose" onclick="closeSettings()">&#x2715;</button>
    </div>
    <label class="lbl" for="apiKeyInput">מפתח Claude API</label>
    <input class="inp" id="apiKeyInput" type="password" placeholder="sk-ant-api03-..." dir="ltr" autocomplete="off">
    <div class="hint">נשמר מקומית בדפדפן בלבד &middot; השג ב-platform.anthropic.com</div>
    <button class="btn" onclick="saveSettings()" style="margin-top:20px">שמור</button>
  </div>
</div>

<div class="scr show" id="scrSearch">
  <div class="swrap">
    <div class="srow">
      <input class="si" id="searchInput" type="search"
        placeholder="חפש: EVO 10, ריבל 9, kayak..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="sbtn" id="searchBtn" onclick="doSearch()">&#128269;</button>
    </div>
    <div class="chips">
      <div class="chip" onclick="fillSearch('EVO 10')">EVO 10</div>
      <div class="chip" onclick="fillSearch('NEO SLS 12')">NEO SLS 12</div>
      <div class="chip" onclick="fillSearch('ריבל 9')">ריבל 9</div>
      <div class="chip" onclick="fillSearch('גלשן 138')">גלשן 138</div>
      <div class="chip" onclick="fillSearch('קיאק')">קיאק</div>
      <div class="chip" onclick="fillSearch('wing foil')">ווינג פויל</div>
    </div>
    <div class="nokey-banner" id="nokeyBanner">
      תוצאות ללא AI (אין מפתח API) &mdash; <span onclick="openSettings()">הגדר מפתח</span> לחיפוש חכם
    </div>
    <div class="stl" id="statusLine"></div>
    <div id="resultList"></div>
  </div>
</div>

<script>
'use strict';

// ── CONSTANTS ──
var CLAUDE_MODEL  = 'claude-haiku-4-5-20251001';
var CLAUDE_URL    = 'https://api.anthropic.com/v1/messages';
var STORAGE_KEY   = 'yamit_key';
var RES_MAX       = 8;
var RES_MIN_SCORE = 0.4;
var FUSE_MAX      = 40;

// ── DATA GLOBALS ──
var PRODUCTS         = [];   // loaded from product_index.json
var PRODUCTS_UPDATED = '';   // ISO timestamp
var KNOWLEDGE        = {};   // sport name -> text (loaded async)
var FUSE             = null; // Fuse.js instance (built after PRODUCTS loads)

// ── SAFE HTML ESCAPE (used everywhere before DOM insertion) ──
// All user-supplied and inventory data is passed through esc() before
// being placed into HTML via innerHTML. This prevents XSS.
function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}


// ── SETTINGS (T2) ──
function getKey()    { return localStorage.getItem(STORAGE_KEY) || ''; }
function setKey(k)   { localStorage.setItem(STORAGE_KEY, k); }

function openSettings() {
  document.getElementById('apiKeyInput').value = getKey();
  document.getElementById('settingsOv').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsOv').classList.remove('show');
}
function saveSettings() {
  var k = document.getElementById('apiKeyInput').value.trim();
  if (k) setKey(k);
  closeSettings();
}
document.getElementById('settingsOv').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeSettings();
});

// ── PRODUCT INDEX ──
function loadProductIndex() {
  return fetch('product_index.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || !data.products || !data.products.length) return;
      PRODUCTS = data.products;
      PRODUCTS_UPDATED = data.updated || '';
      FUSE = new Fuse(PRODUCTS, {
        keys: ['search_doc'],
        threshold: 0.4,
        includeScore: true,
        ignoreLocation: true,
      });
      updateBadge();
    });
}

function updateBadge() {
  var total = PRODUCTS.length;
  var inStock = PRODUCTS.filter(function(p) {
    return p.variants.some(function(v) { return v.stock === 'in_stock'; });
  }).length;
  var el = document.getElementById('badge');
  if (total) {
    var age = '';
    if (PRODUCTS_UPDATED) {
      var days = Math.floor((Date.now() - new Date(PRODUCTS_UPDATED).getTime()) / 86400000);
      age = days === 0 ? ' \u00b7 \u05d4\u05d9\u05d5\u05dd' : ' \u00b7 ' + days + 'd';
    }
    el.textContent = inStock + '/' + total + age;
    el.className = 'badge on';
  } else {
    el.textContent = '\u05d8\u05d5\u05e2\u05df...';
    el.className = 'badge';
  }
}

// ── SPORT DETECTION + KNOWLEDGE ──
var SPORT_ROUTES = [
  { keys: ['\u05e1\u05d0\u05e4', 'sup', '\u05d2\u05dc\u05d9\u05e9\u05ea \u05e1\u05d0\u05e4'], file: 'sup' },
  { keys: ['\u05d2\u05dc\u05d9\u05e9\u05ea \u05d2\u05dc\u05d9\u05dd', 'surf', 'surfboard', '\u05dc\u05d5\u05e0\u05d2\u05d1\u05d5\u05e8\u05d3'], file: 'surf' },
  { keys: ['\u05e7\u05d9\u05d9\u05d8', 'kite', 'kitesurfing'], file: 'kite' },
  { keys: ['\u05d5\u05d5\u05d9\u05e0\u05d2', 'wing'], file: 'wing' },
  { keys: ['\u05d2\u05dc\u05d9\u05e9\u05ea \u05e8\u05d5\u05d7', 'windsurf', '\u05de\u05e4\u05e8\u05e9', '\u05d2\u05dc\u05e9\u05df \u05e8\u05d5\u05d7'], file: 'windsurf' },
  { keys: ['\u05e7\u05d9\u05d0\u05e7', 'kayak', '\u05e1\u05e8\u05e4\u05e1\u05e7\u05d9', 'surf ski', '\u05d7\u05ea\u05d9\u05e8\u05d4'], file: 'kayak' },
  { keys: ['\u05d7\u05dc\u05d9\u05e4\u05d4', 'wetsuit', '\u05d1\u05d9\u05d2\u05d5\u05d3', '\u05e0\u05d0\u05d5\u05e4\u05e8\u05df'], file: 'clothing' },
  { keys: ['\u05e4\u05d5\u05d9\u05dc', 'foil', 'hydrofoil'], files: ['kite', 'wing', 'windsurf'] },
];

function detectSport(query) {
  var q = query.toLowerCase();
  var files = {};
  SPORT_ROUTES.forEach(function(route) {
    if (route.keys.some(function(k) { return q.indexOf(k) !== -1; })) {
      var targets = route.file ? [route.file] : route.files;
      targets.forEach(function(f) { files[f] = true; });
    }
  });
  return Object.keys(files);
}

function buildKnowledgePrompt(sportFiles) {
  var parts = [];
  if (KNOWLEDGE['master']) parts.push(KNOWLEDGE['master']);
  sportFiles.forEach(function(f) { if (KNOWLEDGE[f]) parts.push(KNOWLEDGE[f]); });
  return parts.join('\n\n---\n\n');
}

function loadKnowledge() {
  ['master','kite','wing','windsurf','sup','surf','kayak','clothing'].forEach(function(name) {
    fetch('knowledge/' + name + '.txt')
      .then(function(r) { return r.text(); })
      .then(function(text) { KNOWLEDGE[name] = text; })
      .catch(function() {});
  });
}

// ── FUZZY SEARCH ──
function fuzzySearch(query) {
  if (!FUSE || !query.trim()) return [];
  return FUSE.search(query, { limit: FUSE_MAX }).map(function(r) { return r.item; });
}

// ── CLAUDE CLIENT (T6) ──
// CRITICAL FIX: all 3 required headers now included.
// ── CLAUDE CLIENT ──
async function claudeSearch(query, candidates, apiKey, knowledgeText) {
  var list = candidates.map(function(p, i) {
    var inStock = p.variants.some(function(v) { return v.stock === 'in_stock'; });
    return i + '|' + (inStock ? '\u2713' : '\u2717') + '|' + esc(p.name) + '|' + esc(p.cat) + '|' + esc(p.sport);
  }).join('\n');

  var instruction = 'You are an inventory search assistant for an Israeli water sports store (Yamit).\n' +
    'Return ONLY a JSON array. Format: [{"idx":<n>,"score":<0.0-1.0>}]\n' +
    'Max ' + RES_MAX + ' results, min score ' + RES_MIN_SCORE + '. Prefer in-stock (\u2713).';

  var systemBlocks = [];
  if (knowledgeText) {
    systemBlocks.push({ type: 'text', text: knowledgeText, cache_control: { type: 'ephemeral' } });
  }
  systemBlocks.push({ type: 'text', text: instruction });

  var resp = await fetch(CLAUDE_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 400,
      system: systemBlocks,
      messages: [{ role: 'user', content: 'Query: "' + query + '"\n\nProducts:\n' + list }],
    }),
  });

  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });
    throw new Error(err.error && err.error.message ? err.error.message : 'HTTP ' + resp.status);
  }

  var data = await resp.json();
  var text = ((data.content && data.content[0] && data.content[0].text) || '[]')
    .replace(/```json|```/g, '').trim();
  var matches = JSON.parse(text);

  return matches
    .filter(function(m) { return typeof m.idx === 'number' && m.score >= RES_MIN_SCORE && candidates[m.idx]; })
    .sort(function(a, b) { return b.score - a.score; })
    .slice(0, RES_MAX)
    .map(function(m) { return candidates[m.idx]; });
}

// ── RENDER ──
function buildCard(product) {
  var inStock = product.variants.some(function(v) { return v.stock === 'in_stock'; });
  var cls  = inStock ? 'y' : 'n';
  var pill = inStock ? '\u05d1\u05de\u05dc\u05d0\u05d9' : '\u05d0\u05d6\u05dc';

  var hasSize  = product.variants.some(function(v) { return v.size; });
  var hasColor = product.variants.some(function(v) { return v.color; });
  var variantHtml = '';

  if (hasColor && hasSize) {
    // Group by color: "כחול: S · M✓ / שחור: L✓ · XL"
    var colorMap = {}, colorOrder = [];
    product.variants.forEach(function(v) {
      var c = v.color || '\u2014';
      if (!colorMap[c]) { colorMap[c] = []; colorOrder.push(c); }
      colorMap[c].push(v);
    });
    variantHtml = colorOrder.map(function(c) {
      var sizes = colorMap[c].map(function(v) {
        return esc(v.size) + (v.stock === 'in_stock' ? '\u2713' : '');
      }).join(' \u00b7 ');
      return esc(c) + ': ' + sizes;
    }).join('<br>');
  } else if (hasColor) {
    variantHtml = product.variants.map(function(v) {
      return esc(v.color) + (v.stock === 'in_stock' ? '\u2713' : '');
    }).join(' \u00b7 ');
  } else if (hasSize) {
    variantHtml = product.variants.map(function(v) {
      return esc(v.size) + (v.stock === 'in_stock' ? '\u2713' : '');
    }).join(' \u00b7 ');
  }

  var priceHtml = '';
  if (product.sale) {
    priceHtml = '<span class="price-tag">\u20aa' + product.sale.toLocaleString('he-IL') + '</span>' +
                '<span class="price-strike">\u20aa' + (product.price || product.sale).toLocaleString('he-IL') + '</span>';
  } else if (product.price) {
    priceHtml = '<span class="price-tag">\u20aa' + product.price.toLocaleString('he-IL') + '</span>';
  }

  var btnHref  = product.url ||
    'https://yamitysb.co.il/?s=' + encodeURIComponent(product.name) + '&post_type=product';
  var btnLabel = product.url ? '\u05dc\u05d7\u05e0\u05d5\u05ea \u2197' : '\u05d7\u05d9\u05e4\u05d5\u05e9 \u2197';

  return '<div class="card ' + cls + '">' +
    '<div class="ctop">' +
      '<div class="cname">' + esc(product.name) + '</div>' +
      '<div class="pill ' + cls + '">' + pill + '</div>' +
    '</div>' +
    '<div class="tags">' +
      '<span class="tag">' + esc(product.cat) + '</span>' +
      (product.sku ? '<span class="tag">' + esc(product.sku) + '</span>' : '') +
    '</div>' +
    (variantHtml ? '<div class="variants">' + variantHtml + '</div>' : '') +
    '<div class="cfoot">' +
      '<div class="reason"></div>' +
      priceHtml +
      '<a class="price-btn" href="' + esc(btnHref) + '" target="_blank" rel="noopener">' + btnLabel + '</a>' +
    '</div>' +
    '</div>';
}

function buildSkeletons(n) {
  var out = '<div class="rlist">';
  for (var i = 0; i < n; i++) {
    out += '<div class="sk">' +
      '<div class="skb" style="height:16px;width:65%"></div>' +
      '<div class="skb" style="height:11px;width:40%"></div>' +
      '<div class="skb" style="height:13px;width:50%;margin-top:10px"></div>' +
      '</div>';
  }
  out += '</div>';
  return out;
}

function buildEmpty(icon, title, msg) {
  return '<div class="empty">' +
    '<div class="ico">' + icon + '</div>' +
    '<h3>' + esc(title) + '</h3>' +
    '<p>' + esc(msg) + '</p>' +
    '</div>';
}


// ── SEARCH SCREEN (T7) ──
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function fillSearch(text) {
  document.getElementById('searchInput').value = text;
  doSearch();
}

async function doSearch() {
  var query     = document.getElementById('searchInput').value.trim();
  if (!query) return;

  var apiKey    = getKey();
  var rl        = document.getElementById('resultList');
  var stl       = document.getElementById('statusLine');
  var nokeyEl   = document.getElementById('nokeyBanner');
  var searchBtn = document.getElementById('searchBtn');

  if (!PRODUCTS.length) {
    rl.innerHTML = buildEmpty('\ud83d\udce6', '\u05d8\u05d5\u05e2\u05df \u05de\u05dc\u05d0\u05d9...', '\u05d0\u05e0\u05d0 \u05d4\u05de\u05ea\u05df');
    return;
  }

  searchBtn.disabled = true;
  nokeyEl.classList.remove('show');
  stl.textContent = '\u05de\u05e1\u05e0\u05df \u05de\u05d5\u05e2\u05de\u05d3\u05d9\u05dd...';
  rl.innerHTML = buildSkeletons(4);

  try {
    // Stage 1: Fuse.js fuzzy
    var candidates = fuzzySearch(query);

    if (!candidates.length) {
      rl.innerHTML = buildEmpty('\ud83e\udd14', '\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0', '\u05e0\u05e1\u05d4 \u05de\u05d5\u05e0\u05d7 \u05d0\u05d7\u05e8 \u2014 EVO 10, \u05e8\u05d9\u05d1\u05dc 9, kayak');
      stl.textContent = '';
      searchBtn.disabled = false;
      return;
    }

    var products;

    if (!apiKey) {
      // Fallback: show Fuse.js top 20 directly
      nokeyEl.classList.add('show');
      products = candidates.slice(0, 20);
      stl.textContent = products.length + ' \u05ea\u05d5\u05e6\u05d0\u05d5\u05ea (\u05de\u05d9\u05dc\u05d5\u05ea \u05de\u05e4\u05ea\u05d7)';
    } else {
      // Stage 2+3: detect sport -> build knowledge -> Claude re-rank
      var sportFiles    = detectSport(query);
      var knowledgeText = buildKnowledgePrompt(sportFiles);
      stl.textContent   = candidates.length + ' \u05de\u05d5\u05e2\u05de\u05d3\u05d9\u05dd \u2192 Claude...';
      products = await claudeSearch(query, candidates, apiKey, knowledgeText);
      stl.textContent   = products.length ? products.length + ' \u05ea\u05d5\u05e6\u05d0\u05d5\u05ea' : '';
    }

    if (!products.length) {
      rl.innerHTML = buildEmpty('\ud83e\udd37', '\u05d0\u05d9\u05df \u05ea\u05d5\u05e6\u05d0\u05d5\u05ea', '\u05e0\u05e1\u05d4: EVO 10, \u05e8\u05d9\u05d1\u05dc 9, \u05e7\u05d9\u05d0\u05e7, wing foil');
    } else {
      rl.innerHTML = '<div class="rlist">' + products.map(buildCard).join('') + '</div>';
    }
  } catch(e) {
    rl.innerHTML = buildEmpty('\u26a0\ufe0f', '\u05e9\u05d2\u05d9\u05d0\u05d4', esc(e.message));
    stl.textContent = '';
  }

  searchBtn.disabled = false;
}

// ── NAVIGATION + INIT ──
function showSearch() {
  document.getElementById('scrSearch').classList.add('show');
  document.getElementById('searchInput').focus();
}

(function init() {
  showSearch();
  loadProductIndex().catch(function() {});
  loadKnowledge();
})();
</script>
</body>
